name: Unity Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  UNITY_VERSION: "6000.0.23f1"
  PROJECT_PATH:  "."

jobs:

  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Edit Mode Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE:    ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:      ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD:   ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath:  ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode:     editmode
          artifactsPath: TestResults

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults

  # ── WebGL ──────────────────────────────────────────────────────────────────
  build-webgl:
    name: Build WebGL
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath:    ${{ env.PROJECT_PATH }}
          unityVersion:   ${{ env.UNITY_VERSION }}
          targetPlatform: WebGL
          buildName:      MoonlightMagicHouse
          buildsPath:     Builds

      - uses: actions/upload-artifact@v4
        with:
          name: WebGL-Build
          path: Builds/WebGL
          retention-days: 14

  # ── iOS ────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    needs: test
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath:    ${{ env.PROJECT_PATH }}
          unityVersion:   ${{ env.UNITY_VERSION }}
          targetPlatform: iOS
          buildName:      MoonlightMagicHouse

      - uses: actions/upload-artifact@v4
        with:
          name: iOS-XCode
          path: Builds/iOS
          retention-days: 7

  # ── Android ────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:    ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:      ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD:   ${{ secrets.UNITY_PASSWORD }}
          ANDROID_KEYSTORE_NAME:  ${{ secrets.ANDROID_KEYSTORE_NAME }}
          ANDROID_KEYSTORE_BASE64:${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASS:  ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS_NAME: ${{ secrets.ANDROID_KEY_ALIAS_NAME }}
          ANDROID_KEY_ALIAS_PASS: ${{ secrets.ANDROID_KEY_ALIAS_PASS }}
        with:
          projectPath:    ${{ env.PROJECT_PATH }}
          unityVersion:   ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          buildName:      MoonlightMagicHouse
          androidExportType: androidAppBundle

      - uses: actions/upload-artifact@v4
        with:
          name: Android-AAB
          path: Builds/Android
          retention-days: 7

  # ── Deploy WebGL to Onde Portal ────────────────────────────────────────────
  deploy-webgl:
    name: Deploy WebGL → Onde Portal
    needs: build-webgl
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: WebGL-Build
          path: webgl-dist

      - name: Deploy via rsync
        env:
          DEPLOY_KEY: ${{ secrets.ONDE_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.ONDE_DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.ONDE_DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            webgl-dist/ "$DEPLOY_HOST:$DEPLOY_PATH/moonlight-magic-house/"
